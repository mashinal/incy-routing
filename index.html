<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">

    <title>Добавление маршрутизации INCY</title>

    <style>
        body {
            max-width: 720px;
            margin: 64px auto;
            padding: 0 20px;

            font-family: Arial, sans-serif;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
        }

        .button {
            display: inline-block;

            padding: 12px 18px;

            border: 1px solid currentColor;
            border-radius: 8px;

            color: inherit;
            font-weight: 600;
            text-decoration: none;
        }

        .button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <h1>Маршрутизация INCY</h1>

    <p>
        Нажми кнопку, чтобы добавить профиль маршрутизации
        <strong>RU services direct</strong> с автоматическим обновлением.
    </p>

    <div class="actions">
        <a
            class="button"
            href="incy://autorouting/onadd/https://raw.githubusercontent.com/mashinal/incy-routing/main/profile.json"
        >
            Добавить с автообновлением
        </a>
    </div>

    <p>
        Браузер может запросить разрешение на открытие приложения INCY.
    </p>
</body>
</html>
