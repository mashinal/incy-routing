<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Добавление маршрутизации INCY</title>
  <style>
    body {
      max-width: 720px;
      margin: 64px auto;
      padding: 0 20px;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 24px 0;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid currentColor;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    code {
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <h1>Маршрутизация INCY</h1>

  <p>
    Нажми кнопку и подтверди добавление профиля
    <strong>RU services direct</strong>.
  </p>

  <div class="actions">
    <a class="button" href="#" id="installRoutingButton">
      Добавить с автообновлением
    </a>
  </div>

  <p>
    При первом открытии браузер может запросить разрешение на запуск INCY.
  </p>

  <p>
    Профиль:
    <code>https://raw.githubusercontent.com/mashinal/incy-routing/main/profile.json</code>
  </p>

  <script>
    document
      .getElementById("installRoutingButton")
      .addEventListener("click", function (event) {
        event.preventDefault();

        const scheme = ["in", "cy"].join("");
        const profileUrl =
          "https://raw.githubusercontent.com/mashinal/incy-routing/main/profile.json";

        window.location.href =
          scheme + "://autorouting/onadd/" + profileUrl;
      });
  </script>
</body>
</html>
